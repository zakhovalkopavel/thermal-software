services:
  # ==========================================
  # Database - PostgreSQL
  # ==========================================

  postgres:
    image: postgres:${POSTGRES_VERSION}
    container_name: thermal-postgres
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT}:5432"
    networks:
      - thermal-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ==========================================
  # Cache - Redis
  # ==========================================

  redis:
    image: redis:${REDIS_VERSION}
    container_name: thermal-redis
    ports:
      - "${REDIS_PORT}:6379"
    networks:
      - thermal-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ==========================================
  # Backend - NestJS API
  # ==========================================

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile
      args:
        NODE_VERSION: ${NODE_VERSION}
    container_name: thermal-backend
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: ${BACKEND_PORT}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN}
      API_VERSION: ${API_VERSION}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
    expose:
      - "${BACKEND_PORT}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - thermal-network
    volumes:
      - ./backend:/app  # Bind mount entire backend folder
      - backend_node_modules:/app/node_modules  # Override with volume for performance
    labels:
      - "app.version=${APP_VERSION}"
      - "app.name=backend"
    restart: unless-stopped

  # ==========================================
  # Frontend - React SPA
  # ==========================================

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend/Dockerfile
      args:
        NODE_VERSION: ${NODE_VERSION}
        VITE_API_URL: ${VITE_API_URL}
    container_name: thermal-frontend
    environment:
      VITE_API_URL: ${VITE_API_URL}
      VITE_APP_VERSION: ${APP_VERSION}
      VITE_PORT: ${VITE_PORT}
    networks:
      - thermal-network
    volumes:
      - ./frontend:/app  # Bind mount entire frontend folder
      - frontend_node_modules:/app/node_modules  # Override with volume for performance
      - frontend_dist:/app/dist  # Share built files with nginx
    labels:
      - "app.version=${APP_VERSION}"
      - "app.name=frontend"
    restart: unless-stopped

  # ==========================================
  # Python Scripts Runner
  # ==========================================

  python:
    image: python:${PYTHON_VERSION}
    container_name: thermal-python
    working_dir: /app
    environment:
      PYTHONUNBUFFERED: 1
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE}
    volumes:
      - ./python_scripts:/app/python_scripts
      - ./legacy/library:/app/library
      - ./tmp/reports/python:/app/reports
      - python_packages:/usr/local/lib/python3.14/site-packages
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - thermal-network
    command: tail -f /dev/null
    labels:
      - "app.version=${APP_VERSION}"
      - "app.name=python-scripts"
    restart: unless-stopped

  # ==========================================
  # Nginx Reverse Proxy
  # ==========================================

  nginx:
    build:
      context: ./docker/nginx
      dockerfile: Dockerfile
      args:
        NGINX_VERSION: ${NGINX_VERSION}
    container_name: thermal-nginx
    ports:
      - "${HTTP_PORT}:80"
      - "${HTTPS_PORT}:443"
    depends_on:
      - backend
      - frontend
    networks:
      - thermal-network
    volumes:
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
      - frontend_dist:/usr/share/nginx/html:ro  # Serve frontend static files
    labels:
      - "app.version=${APP_VERSION}"
      - "app.name=nginx-proxy"
    restart: unless-stopped

networks:
  thermal-network:
    driver: bridge

volumes:
  postgres_data:
  backend_node_modules:
  frontend_node_modules:
  frontend_dist:  # Shared volume for built frontend files
  python_packages:
