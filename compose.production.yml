# Production Docker Compose - Uses Images from Registry
# This file is used on production servers to pull pre-built images

services:
  # ==========================================
  # Database - PostgreSQL
  # ==========================================

  postgres:
    image: postgres:${POSTGRES_VERSION}
    container_name: thermal-postgres
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT}:5432"
    networks:
      - thermal-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ==========================================
  # Cache - Redis
  # ==========================================

  redis:
    image: redis:${REDIS_VERSION}
    container_name: thermal-redis
    ports:
      - "${REDIS_PORT}:6379"
    networks:
      - thermal-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ==========================================
  # Backend - NestJS API (from registry)
  # ==========================================

  backend:
    image: ${DOCKER_REGISTRY}/${DOCKER_USERNAME}/${IMAGE_PREFIX}-backend:${VERSION}
    container_name: thermal-backend
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: ${BACKEND_PORT}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN}
      API_VERSION: ${API_VERSION}
      CORS_ORIGIN: ${CORS_ORIGIN}
    expose:
      - "${BACKEND_PORT}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - thermal-network
    labels:
      - "app.version=${APP_VERSION}"
      - "app.name=backend"
    restart: unless-stopped

  # ==========================================
  # Frontend - React SPA (from registry)
  # ==========================================

  frontend:
    image: ${DOCKER_REGISTRY}/${DOCKER_USERNAME}/${IMAGE_PREFIX}-frontend:${VERSION}
    container_name: thermal-frontend
    environment:
      VITE_API_URL: ${VITE_API_URL}
      VITE_APP_VERSION: ${APP_VERSION}
    expose:
      - "${FRONTEND_PORT}"
    networks:
      - thermal-network
    labels:
      - "app.version=${APP_VERSION}"
      - "app.name=frontend"
    restart: unless-stopped

  # ==========================================
  # Python Scripts Runner
  # ==========================================

  python:
    image: python:${PYTHON_VERSION}
    container_name: thermal-python
    working_dir: /app
    environment:
      PYTHONUNBUFFERED: 1
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE}
    volumes:
      - ./python_scripts:/app/python_scripts
      - ./legacy/library:/app/library
      - ./tmp/reports/python:/app/reports
      - python_packages:/usr/local/lib/python3.14/site-packages
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - thermal-network
    command: tail -f /dev/null
    labels:
      - "app.version=${APP_VERSION}"
      - "app.name=python-scripts"
    restart: unless-stopped

  # ==========================================
  # Nginx Reverse Proxy (from registry)
  # ==========================================

  nginx:
    image: ${DOCKER_REGISTRY}/${DOCKER_USERNAME}/${IMAGE_PREFIX}-nginx:${VERSION}
    container_name: thermal-nginx
    ports:
      - "${HTTP_PORT}:80"
      - "${HTTPS_PORT}:443"
    depends_on:
      - backend
      - frontend
    networks:
      - thermal-network
    volumes:
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    labels:
      - "app.version=${APP_VERSION}"
      - "app.name=nginx-proxy"
    restart: unless-stopped

networks:
  thermal-network:
    driver: bridge

volumes:
  postgres_data:
  python_packages:

