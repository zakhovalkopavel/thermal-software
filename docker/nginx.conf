server {
    listen 80;
    server_name localhost;

    # Serve refractory calculator at root
    location / {
        alias /usr/share/nginx/html/refractory/public/;
        try_files $uri $uri/ /index.html;
    }

    # Refractory Calculator - dist files
    location /dist/ {
        alias /usr/share/nginx/html/refractory/dist/;
    }

    # Also accessible via /refractory-calculator/ (for multi-project consistency)
    location /refractory-calculator/ {
        alias /usr/share/nginx/html/refractory/public/;
        try_files $uri $uri/ /refractory-calculator/index.html;
    }

    # Refractory Calculator - dist files via /refractory-calculator/
    location /refractory-calculator/dist/ {
        alias /usr/share/nginx/html/refractory/dist/;
    }

    # Health check
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Placeholder for future subprojects
    # location /furnace-combustion/ {
    #     alias /usr/share/nginx/html/furnace-combustion/public/;
    #     try_files $uri $uri/ /furnace-combustion/index.html;
    # }
}

